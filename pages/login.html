<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - LogiDock</title>
    <link rel="stylesheet" href="../assets/css/login_cadastro.css">
</head>
<body>
    <div class="logo">
        <a href="../index.html"><img src="../assets/images/logo.png" alt="" id="logo"></a>
    </div>
    <div class="container">
        <span id="titulo">LOGIN</span>
        <div class="campo">
            <img src="../assets/icons/icone_usuario.png" alt="" class="icone">
            <input type="text" id="ipt_usuario" placeholder="USUÁRIO">
        </div>
        <div class="campo">
            <img src="../assets/icons/icone_senha.png" alt="" class="icone">
            <input type="password" id="ipt_senha" placeholder="SENHA">
            <button onclick="visualizar_senha()" class="botao_visualizar_senha"><img src="../assets/icons/icone_olho.png" alt="" class="icone" id="olho"></button>
        </div>
        <button onclick="entrar()">ENTRAR</button>
        <span id="esqueci_senha">Esqueci a senha</span>
        <span id="sem_cadastro">NÃO POSSUI CONTA? <a href="../pages/cadastro.html">CADASTRE-SE</a></span>
    </div>
</body>
<script>
    let usuarios = [
        { usuario: "admin",    senha: "123456" },
        { usuario: "logidock", senha: "123456"  }
    ];

    function entrar() {
        let usuario = ipt_usuario.value.trim();
        let senha = ipt_senha.value;

        if (!usuario || !senha) {
            alert("Preencha usuário e senha.");
        } else{
            let encontrou = false;
            for (let i = 0; i < usuarios.length; i++) {
                if (usuarios[i].usuario == usuario && usuarios[i].senha == senha) {
                    encontrou = true;
                    break;
                }       
            }
            if (encontrou) {
                alert("Login realizado com sucesso!");
                window.location.href = "../pages/dashboard.html";
            } else {
                alert("Usuário ou senha incorretos.");
            }
        }
    }
    
    let senha_visivel = false
    function visualizar_senha(){

        if(!senha_visivel){
            ipt_senha.type = "text";
            senha_visivel = true;
        } else if (senha_visivel){
            ipt_senha.type = "password"
            senha_visivel = false;
        }
    }
</script>
</html>
