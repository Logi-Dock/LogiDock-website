<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<style>

    body
    {
        display: flex;
        flex-direction: column;
    }

    .kpi
    {
        display: flex;
        flex-direction: row;
        justify-content: center;
    }

    .kpi_box
    {
        border: 2px solid blue;
        text-align: center;
        margin-right: 10px;
        padding: 20px;
    }

    .container_chart
    {
        height: 350px;
        width: 450px;
    }

    .chart
    {
        position: relative;
    }

</style>
<body>
    
    <div class="kpi">

        <div class="kpi_box">
            <h3>Docas que tiveram ocorrência</h3> <br>
            <h1>8</h1>
        </div>

        <div class="kpi_box">
            <h3>Operações fora do prazo</h3> <br>
            <h1>3</h1>
        </div>

        <div class="kpi_box">
            <h3>Operações dentro do prazo</h3> <br>
            <h1>3%</h1>
        </div>

    </div>

    <br><br>

    <div class="container_chart">
        <canvas id="grafico_1" class="chart"></canvas>
    </div>

</body>

<script>

    const ctx_grafico_1 = document.getElementById('grafico_1');

    new Chart(ctx_grafico_1, {
    type: 'pie',

    data:
    {
        labels: ['Dentro do prazo', 'Fora do prazo'],

        datasets:
        [
            {
                data: [80, 20],
                borderWidth: 1
            }
        ]
    },
    
    options:
    {
        plugins: {
        title: {
            display: true,
            text: 'Status das Operações'
        },
        legend: {
        position: 'right' // 👈 move pra direita
    }   
    }
    }
    });

</script>

</html>
