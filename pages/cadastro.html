<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro - LogiDock</title>
    <link rel="stylesheet" href="../assets/css/login_cadastro.css">
</head>
<body>
    <div class="logo">
        <img src="../assets/images/logo.png" alt="" id="logo">
    </div>
    <div class="container">
        <p id="titulo">CADASTRO</p>
        <div class="campo">
            <img src="../assets/icons/icone_usuario.png" alt="" class="icone">
            <input type="text" id="ipt_usuario" placeholder="USUÁRIO">
        </div>
        <div class="campo">
            <img src="../assets/icons/icone_email.png" alt="" class="icone" id="email">
            <input type="text" id="ipt_usuario" placeholder="EMAIL">
        </div>
        <div class="campo">
            <img src="../assets/icons/icone_senha.png" alt="" class="icone">
            <input type="password" id="ipt_senha" placeholder="SENHA">
            <img src="../assets/icons/icone_olho.png" alt="" class="icone" id="olho">
        </div>
        <div class="campo">
            <img src="../assets/icons/icone_cnpj.png" alt="" class="icone">
            <input type="text" id="ipt_usuario" placeholder="CNPJ">
        </div>
        <button onclick="entrar()">ENTRAR</button>
    </div>
</body>
</html>
