<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pré desenvolvimento</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="../assets/css/dashboard.css">
    <link rel="stylesheet" href="../assets/css/style.css">
</head>

<body>
    <header>
        <a href="../index.html"><img src="../assets/images/logidock_logov2.png" alt="Logo da LogiDock" class="logo"></a>
        <h1>PAINEL LOGÍSTICO</h1>
    </header>

    <div class="kpi">
        <div class="kpi-item">
            <h1 id="kpi-title">Tempo médio por Doca</h1>
            <div class="kpi-item-content">
                <img src="../assets/icons/icone_relogio.png" alt="Relógio">
                <h1 id="ipt_TempoMediaDocas"></h1>
            </div>
        </div>

        <div class="kpi-item">
            <h1 id="kpi-title">Taxa de docas que tiveram ocorrência</h1>
            <div class="kpi-item-content">
                <img src="../assets/icons/icone_caminhao.png" alt="Caminhão">
                <h1 id="ipt_DocasQueTiveramOcorrencia"></h1>
            </div>
        </div>

        <div class="kpi-item">
            <h1 id="kpi-title">Total de ocorrências</h1>
            <div class="kpi-item-content">
                <img src="../assets/icons/icone_alarme.png" alt="Alarme">
                <h1 id="ipt_TotalOcorrencias"></h1>
            </div>
        </div>

        <div class="kpi-item">
            <h1 id="kpi-title">Operações dentro do prazo</h1>
            <div class="kpi-item-content">
                <img src="../assets/icons/icone_verificado.png" alt="Verificado">
                <h1 id="ipt_TaxaDeOperacoesDentroDoPrazo"></h1>
            </div>
        </div>
    </div>

    <div class="container_charts">
        <div class="top-left">
            <canvas id="ipt_GraficoBarrasLinhas"></canvas>
        </div>

        <div class="top-right">
            <canvas id="ipt_GraficoPizza"></canvas>
        </div>

        <div class="bottom">
            <canvas id="ipt_GraficoDeGantt"></canvas>
        </div>
    </div>
</body>

<script>
    // Aqui eu declaro as variaveis do canvas
    const GraficoBarrasLinhas = document.getElementById('ipt_GraficoBarrasLinhas');
    const GraficoDeGantt = document.getElementById('ipt_GraficoDeGantt');
    const GraficoDePizza = document.getElementById('ipt_GraficoPizza');

    // Labels (docas ordenadas por tempo médio)
    const labels = ['Doca 8', 'Doca 1', 'Doca 7', 'Doca 4', 'Doca 6', 'Doca 3', 'Doca 2', 'Doca 5'];

    // Dados já separados
    const LinhasDadosAzuis = [null, null, null, 3.13, 3.00, 2.75, 2.13, 2.13];
    const LinhasDadosVermelhos = [5.63, 5.25, null, null, null, null, null, null];
    const LinhasDadosLaranjas = [null, null, 4.58, null, null, null, null, null];

    // Linha limite
    const limite = [];

    for (let i = 0; i < labels.length; i++) {
        limite.push(5);
    }

    new Chart(GraficoBarrasLinhas, {
        type: 'bar',
        data: {
            labels: labels,
            datasets: [
                {
                    label: 'Dentro do prazo',
                    data: LinhasDadosAzuis,
                    backgroundColor: 'blue',
                    borderColor: 'black',
                },
                {
                    label: 'Fora do prazo',
                    data: LinhasDadosVermelhos,
                    backgroundColor: 'red',
                    borderColor: 'black',
                },
                {
                    label: 'Quase fora do prazo',
                    data: LinhasDadosLaranjas,
                    backgroundColor: 'orange',
                    borderColor: 'black',
                },
                {
                    type: 'line',
                    label: 'Limite Invisivel',
                    data: limite,
                    borderColor: 'red',
                    borderWidth: 2,
                    pointRadius: 0,
                    fill: false,
                    borderDash: [5, 5],
                    order: 1
                }
            ]
        },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            scales: {
                y: {
                    beginAtZero: true,
                    title: {
                        display: true,
                        text: 'Horas'
                    },
                    stacked: true
                },
                x: {
                    offset: true,
                    stacked: true
                }
            },
            plugins: {
                title: {
                    display: true,
                    text: 'TEMPO MÉDIO POR DOCA',
                    color: 'black',
                    font: {
                        size: 32
                    }
                },
                legend: {
                    labels: {
                        filter: (item) => item.text !== 'Limite Invisivel' // Esconde a legenda da linha limite
                    }
                }
            }
        }
    });

    // Registros mockados para o gráfico de Gantt
    const foraDoTempo = [
        { duracao: 9, x: [9.5, 18.5], y: "Doca 1" },
        { duracao: 6, x: [7, 13], y: "Doca 8" },
        { duracao: 5.41, x: [15.34, 20.75], y: "Doca 7" },
        { duracao: 5.25, x: [14.25, 19.5], y: "Doca 8" }
    ];

    const dentroDoTempo = [
        { duracao: 3.75, x: [11, 14.75], y: "Doca 7" },
        { duracao: 3.25, x: [12.25, 15.5], y: "Doca 4" },
        { duracao: 3, x: [8, 11], y: "Doca 4" },
        { duracao: 3, x: [9, 12], y: "Doca 6" },
        { duracao: 3, x: [11, 14], y: "Doca 3" },
        { duracao: 3, x: [13, 16], y: "Doca 6" },
        { duracao: 2.75, x: [11, 13.75], y: "Doca 5" },
        { duracao: 2.5, x: [7.75, 10.25], y: "Doca 3" },
        { duracao: 2.5, x: [10.25, 12.75], y: "Doca 2" },
        { duracao: 1.75, x: [7.25, 9], y: "Doca 2" },
        { duracao: 1.5, x: [7, 8.5], y: "Doca 1" },
        { duracao: 1.5, x: [8.5, 10], y: "Doca 5" }
    ];

    new Chart(GraficoDeGantt, {
        type: 'bar',
        data: {
            datasets: [
                {
                    label: 'Fora do Prazo',
                    data: foraDoTempo,
                    backgroundColor: 'red',
                    borderColor: 'black',
                    borderWidth: 1
                },
                {
                    label: 'Dentro do Prazo',
                    data: dentroDoTempo,
                    backgroundColor: 'blue',
                    borderColor: 'black',
                    borderWidth: 1
                }

            ]
        },
        options: {
            indexAxis: 'y',  // Transforma em barras horizontais
            responsive: true,
            maintainAspectRatio: false,
            plugins: {
                title: {
                    display: true,
                    text: 'VISÃO DETALHADA - TEMPO DE PERMANÊNCIA POR DOCA',
                    color: 'black',
                    font: {
                        size: 32
                    }
                },
            },
            scales: {
                x: {
                    min: 0,
                    max: 24,
                    ticks: {
                        stepSize: 1,
                        callback: (value) => value + ":00" // Coloca o ":00" no visual
                    },
                },
                y: {
                    stacked: true
                }
            }
        }
    });

    // Registros mockados para o gráfico de pizza
    const PizzaDadosAzuis = ['3.13', '3.00', '2.75', '2.13', '2.13'];
    const PizzaDadosLaranjas = ['4.58'];
    const PizzaDadosVermelhos = ['5.63', '5.25'];

    new Chart(GraficoDePizza, {
        type: 'pie',
        data:
        {
            labels: ['Dentro do prazo', 'Quase fora do prazo', 'Fora do prazo'],

            datasets:
                [
                    {
                        data: [PizzaDadosAzuis.length, PizzaDadosLaranjas.length, PizzaDadosVermelhos.length],
                        borderWidth: 1,
                        backgroundColor: ['blue', 'orange', 'red'],
                    }
                ]
        },

        options:
        {
            responsive: true,
            maintainAspectRatio: false,
            plugins: {
                title: {
                    display: true,
                    text: 'STATUS DAS OPERAÇÕES',
                    color: 'black',
                    font: {
                        size: 32
                    }
                },
                legend: {
                    position: 'bottom'
                }
            }
        }
    });

    // Registros mockados para os KPIs
    ipt_TempoMediaDocas.innerHTML = `${3}h ${34}min`;
    ipt_DocasQueTiveramOcorrencia.innerHTML = `${37.5}%`;
    ipt_TotalOcorrencias.innerHTML = `${4}`
    ipt_TaxaDeOperacoesDentroDoPrazo.innerHTML = `${12}`

</script>

</html>
