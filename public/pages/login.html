<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - LogiDock</title>
    <link rel="stylesheet" href="../assets/css/login_cadastro.css">
    <link rel="stylesheet" href="../assets/css/navbar.css">
    <link rel="stylesheet" href="../assets/css/style.css">
</head>
<body>
    <header>
        <a href="../index.html"><img src="../assets/images/logidock_logo.svg" alt="Logo da LogiDock" class="logo"></a>

        <ul class="nav-list">
            <li><a href="../index.html">Início</a></li>
            <li><a href="../index.html#arquitetura_de_solucao">Solução</a></li>
            <li><a href="../pages/sobre-nos.html">Sobre nós</a></li>
            <li><a href="../index.html#footer">Contato</a></li>
        </ul>
        <div class="nav-botao">
            <button><a href="pages/login.html">LOGIN</a></button>
        </div>
    </header>

    <div class="login">
        <div class="container_login">
            <span id="titulo">Login</span>
            <div class="divisor"></div>

            <div class="container_input">
                <span class="titulo_input">E-mail</span>
                <div class="input">
                    <input type="text" id="ipt_email" placeholder="exemplo@email.com">
                </div>
            </div>

            <div class="container_input">
                <span class="titulo_input">Senha</span>
                <div class="input">
                    <input type="text" id="ipt_senha" placeholder="**************">
                    <img id="olho" src="../assets/icons/olho_fechado.png" alt="" onclick="visualizar_senha()">
                </div>
            </div>

            <div class="botoes">
                <button id="botao_cancelar" onclick="window.location.href='../index.html'">Cancelar</button>
                <button id="botao_entrar" onclick="entrar()">Entrar</button>
            </div>
        </div>
    </div>
</body>
<script>

function entrar() {
    let email = ipt_email.value.trim();
    let senha = ipt_senha.value;

    if (!email || !senha) {
        return alert("Preencha usuário e senha.");
    } else if (!email.includes('@') || !email.includes('.')) {
        return alert("Preencha o email corretamente");
    }
    
    fetch("/usuarios/autenticar", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            emailServer: email,
            senhaServer: senha
        })
        }).then(function (resposta) {
            if (resposta.ok) {
            console.log(resposta);

            resposta.json().then(json => {
                console.log(json);
                console.log(JSON.stringify(json));
                sessionStorage.EMAIL_USUARIO = json.email_user;
                sessionStorage.NOME_USUARIO = json.nome_user;
                sessionStorage.ID_USUARIO = json.id_usuario;
                sessionStorage.RAZAO_SOCIAL = json.razao_social;
                sessionStorage.NOME_NIVEL_ACESSO = json.nome_nivel_acesso;
                                
                setTimeout(function () {
                    window.location = "dashboard_graficos.html";
                }, 1000);

            });

        } else {
            console.log("Houve um erro ao tentar realizar o login!");

            resposta.text().then(texto => {
                console.error(texto);
                console.log('E-mail ou senha incorretos.');
                return false;
            });
        }

    }).catch(function (erro) {
        console.log(erro);
        console.log('E-mail ou senha incorretos.');
        return false
    })
}
    
let senha_visivel = false
function visualizar_senha(){

    if(!senha_visivel){
        ipt_senha.type = "text";
        senha_visivel = true;
        olho.src = "../assets/icons/olho_aberto.png";
    } else if (senha_visivel){
        ipt_senha.type = "password"
        senha_visivel = false;
        olho.src = "../assets/icons/olho_fechado.png";
    }
}
</script>
</html>
