<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - LogiDock</title>
    <link rel="stylesheet" href="../assets/css/login_cadastro.css">
</head>
<body>
    <div class="logo">
        <a href="../index.html"><img src="../assets/images/logo.png" alt="" id="logo"></a>
    </div>
    <div class="container">
        <span id="titulo">LOGIN</span>
        <div class="campo">
            <img src="../assets/icons/icone_usuario.png" alt="" class="icone">
            <input type="text" id="ipt_email" placeholder="EMAIL">
        </div>
        <div class="campo">
            <img src="../assets/icons/icone_senha.png" alt="" class="icone">
            <input type="password" id="ipt_senha" placeholder="SENHA">
            <button onclick="visualizar_senha()" class="botao_visualizar_senha"><img src="../assets/icons/olho_aberto.png" alt="" class="icone" id="olho"></button>
        </div>
        <button class="ButtonCadastroLogin" onclick="entrar()">ENTRAR</button>
        <span id="esqueci_senha">Esqueci a senha</span>
        <span id="sem_cadastro">NÃO POSSUI CONTA? <a href="../pages/cadastro.html">CADASTRE-SE</a></span>
    </div>
</body>
<script>

function entrar() {
    let email = ipt_email.value.trim();
    let senha = ipt_senha.value;

    if (!email || !senha) {
        return alert("Preencha usuário e senha.");
    } else if (!email.includes('@') || !email.includes('.')) {
        return alert("Preencha o email corretamente");
    }
    
    fetch("/usuarios/autenticar", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            emailServer: email,
            senhaServer: senha
        })
        }).then(function (resposta) {
            if (resposta.ok) {
            console.log(resposta);

            resposta.json().then(json => {
                console.log(json);
                console.log(JSON.stringify(json));
                sessionStorage.EMAIL_USUARIO = json.email_user;
                sessionStorage.NOME_USUARIO = json.nome_user;
                sessionStorage.ID_USUARIO = json.id_usuario;
                                
                setTimeout(function () {
                    window.location = "dashboard.html";
                }, 1000);

            });

        } else {
            console.log("Houve um erro ao tentar realizar o login!");

            resposta.text().then(texto => {
                console.error(texto);
                console.log('E-mail ou senha incorretos.');
                return false;
            });
        }

    }).catch(function (erro) {
        console.log(erro);
        console.log('E-mail ou senha incorretos.');
        return false
    })
}
    
let senha_visivel = false
function visualizar_senha(){

    if(!senha_visivel){
        ipt_senha.type = "text";
        senha_visivel = true;
        olho.src = "../assets/icons/olho_fechado.png";
    } else if (senha_visivel){
        ipt_senha.type = "password"
        senha_visivel = false;
        olho.src = "../assets/icons/olho_aberto.png";
    }
}
</script>
</html>
