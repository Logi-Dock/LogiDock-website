<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro - LogiDock</title>
    <link rel="stylesheet" href="../assets/css/login_cadastro.css">
</head>
<body>
    <div class="logo">
        <a href="../index.html"><img src="../assets/images/logo.png" alt="" id="logo"></a>
    </div>
    <div class="container">
        <span id="titulo">CADASTRO</span>
        <div class="campo">
            <img src="../assets/icons/icone_usuario.png" alt="" class="icone">
            <input type="text" id="ipt_usuario" placeholder="USUÁRIO">
        </div>
        <div class="campo">
            <img src="../assets/icons/icone_email.png" alt="" class="icone" id="email">
            <input type="text" id="ipt_email" placeholder="EMAIL">
        </div>
        <div class="campo">
            <img src="../assets/icons/icone_senha.png" alt="" class="icone">
            <input type="password" id="ipt_senha" placeholder="SENHA">
            <button onclick="visualizar_senha()" class="botao_visualizar_senha"><img src="../assets/icons/olho_aberto.png" alt="" class="icone" id="olho"></button>
        </div>
        <div class="campo">
            <img src="../assets/icons/icone_cnpj.png" alt="" class="icone">
            <input type="text" id="ipt_codigo" placeholder="CÓDIGO">
        </div>
        <button class="ButtonCadastroLogin" onclick="cadastrar()">CADASTRAR</button>
    </div>
</body>
<script>
    let usuarios = [];

    async function cadastrar() {
        let usuario = ipt_usuario.value.trim();
        let email = ipt_email.value.trim();
        let senha = ipt_senha.value;
        let codigo = ipt_codigo.value.trim();
        let id_usuario = 0;
        let id_empresa = 0;

        if (!usuario || !email || !senha || !codigo) {
            return alert("Preencha todos os campos.");
        } else if (!email.includes("@") || !email.includes(".")) {
            return alert("E-mail inválido.");
        } else if (senha.length < 6) {
            return alert("A senha deve ter no mínimo 6 caracteres.");
        } else if (codigo.length != 8) {
           return alert("CNPJ deve ter 14 dígitos. Exemplo de formato: 12345678901234");
        } 

        await fetch("/usuarios/CadastrarUsuario", {
            method: "POST",
            headers: {
            "Content-Type": "application/json",
            },
            body: JSON.stringify({
                nomeServer: usuario,
                emailServer: email,
                senhaServer: senha,
            }),
        })
        .then(function (resposta) {
            console.log("resposta: ", resposta);

            if (resposta.ok) {
                alert("Cadastro realizado com sucesso!");

            } else {
             throw "Houve um erro ao tentar realizar o cadastro!";
            }
        });


        await fetch(`/usuarios/PegarIdUsuario/${email}`).then(async function (resposta) {
            if(resposta.ok) {
                
                const dadosJson = await resposta.json();
                id_usuario = dadosJson.id_usuario
            }
        })
        
        await fetch(`/empresas/PegarIdEmpresa/${codigo}`).then(async function (resposta) {
            if(resposta.ok) {

                const dadosJson = await resposta.json();
                id_empresa = dadosJson.id_empresa;
            }
        })


        await fetch("/empresas/IntegrarUsuarioNaEmpresa", {
            method: "POST",
            headers: {
            "Content-Type": "application/json",
            },
            body: JSON.stringify({
                fk_usuarioServer: id_usuario,
                fk_empresaServer: id_empresa,
            }),
        })
        .then(function (resposta) {
            console.log("resposta: ", resposta);

            if (resposta.ok) {
                alert("Integração realizada com sucesso! Redirecionando para tela de Login...");

            setTimeout(() => {
                window.location = "login.html";
            }, "2000");

            } else {
            throw "Houve um erro ao tentar realizar o cadastro!";
            }
        });

    }


    let senha_visivel = false
    function visualizar_senha(){

        if(!senha_visivel){
            ipt_senha.type = "text";
            senha_visivel = true;
            olho.src = "../assets/icons/olho_fechado.png";
        } else if (senha_visivel){
            ipt_senha.type = "password"
            senha_visivel = false;
            olho.src = "../assets/icons/olho_aberto.png";
        }
    }
</script>
</html>
